name: Alvy site agent

on:
  schedule:
    - cron: '0 13 * * 1'
  push:
    paths:
      - 'business-context.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Run the update agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GH_AGENT_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/agent-update.mjs
